name: Sync Skill Mirror

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'references/**'
      - 'templates_config.yaml'
      - 'requirements.txt'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sync to Skill
        run: python scripts/sync_skill.py push

      - name: Commit and push
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@example.com"
          git add skills/strategic-emerging-monthly-report/
          git diff --staged --quiet || git commit -m "chore: sync from project to skill"
          git push
